<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Social tegel — Het begon met liefde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,300i&family=Work+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #6B1953;
    --magenta: #C41E7A;
    --rose: #D585AE;
    --rose-tint: #F5E3EE;
    --butter: #FFF8D1;
    --ecru: #F6F1EA;
    --text: #5C5556;
    --text-muted: #8A8283;
    --border-rose: rgba(213, 133, 174, 0.55);
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-body: 'Work Sans', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  .tile {
    width: 1080px; height: 1080px;
    background: var(--butter);
    font-family: var(--font-body);
    color: var(--text);
    padding: 74px 78px 66px;
    display: flex; flex-direction: column;
    position: relative;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .logo { height: 64px; width: auto; display: block; margin: 0 auto 40px; }

  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 24px 44px rgba(74,44,30,0.16);
    overflow: hidden;
    position: relative;
  }
  .card .photo {
    height: 470px;
    background: url('../assets/photos/heart-pleister-alleen.jpg') center 52% / cover no-repeat;
  }
  .card::after {
    content: ""; position: absolute; inset: 12px;
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 6px; pointer-events: none;
  }

  .body { text-align: center; margin-top: 46px; }
  .eyebrow {
    font-size: 22px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--magenta); margin: 0 0 20px;
  }
  h1 {
    font-family: var(--font-display); font-weight: 300;
    font-size: 52px; line-height: 1.16; color: var(--plum);
    letter-spacing: 0.4px; margin: 0 auto; max-width: 820px;
  }
  hr.divider {
    border: 0; border-top: 1.5px solid var(--border-rose);
    width: 130px; margin: 34px auto 0;
  }

  .foot {
    position: absolute; left: 0; right: 0; bottom: 60px;
    text-align: center;
    font-size: 20px; font-weight: 500; letter-spacing: 2.4px;
    text-transform: uppercase; color: var(--plum);
  }
</style>
</head>
<body>
  <div class="tile">
    <img class="logo" src="../design-system/assets/logo/logo-original.png" alt="Ik ga leven">
    <div class="card"><div class="photo"></div></div>
    <div class="body">
      <p class="eyebrow">Gratis mini-training</p>
      <h1>Het begon met liefde.<br>Waarom voelt het nu<br>alsof het niet klopt?</h1>
      <hr class="divider">
    </div>
    <div class="foot">ikgalevencursus.nl</div>
  </div>
</body>
</html>
