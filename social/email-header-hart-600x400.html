<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>E-mailheader — Het begon met liefde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,300i&family=Work+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #6B1953;
    --magenta: #C41E7A;
    --rose-tint: #F5E3EE;
    --butter: #FFF8D1;
    --text: #5C5556;
    --text-muted: #8A8283;
    --border-rose: rgba(213, 133, 174, 0.55);
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-body: 'Work Sans', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  .header {
    width: 600px; height: 400px;
    display: flex;
    font-family: var(--font-body); color: var(--text);
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .left {
    width: 54%; background: var(--butter);
    padding: 46px 40px 40px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .logo { height: 42px; width: auto; margin: 0 0 22px; }
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 2.2px;
    text-transform: uppercase; color: var(--magenta); margin: 0 0 12px;
  }
  h1 {
    font-family: var(--font-display); font-weight: 300;
    font-size: 27px; line-height: 1.18; color: var(--plum);
    letter-spacing: 0.3px; margin: 0;
  }
  hr.divider { border:0; border-top:1.5px solid var(--border-rose); width:88px; margin:18px 0 0; }

  .right {
    width: 46%;
    background: #fff url('../assets/photos/heart-pleister-alleen.jpg') center 50% / cover no-repeat;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="left">
      <img class="logo" src="../design-system/assets/logo/logo-original.png" alt="Ik ga leven">
      <p class="eyebrow">Gratis mini-training</p>
      <h1>Het begon met liefde. Waarom voelt het nu alsof het niet klopt?</h1>
      <hr class="divider">
    </div>
    <div class="right"></div>
  </div>
</body>
</html>
