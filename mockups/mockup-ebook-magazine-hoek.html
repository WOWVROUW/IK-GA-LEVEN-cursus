<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Magazine-mockup (hoek) — Het begon met liefde</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  .stage {
    width: 1600px; height: 1200px;
    position: relative; overflow: hidden;
    background: radial-gradient(135% 130% at 46% 30%,
      #F8F3EB 0%, #F1EADD 44%, #E6DDCC 76%, #DCD2BF 100%);
    perspective: 1900px;
    display: flex; align-items: center; justify-content: center;
  }
  .scene {
    position: relative;
    width: 1120px; height: 820px;
    transform-style: preserve-3d;
    transform: rotateX(41deg) rotate(-15deg);
  }

  /* Contactschaduwen op de "tafel" */
  .shadow {
    position: absolute; border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(60,30,15,0.30) 0%, rgba(60,30,15,0.14) 45%, rgba(60,30,15,0) 72%);
    filter: blur(26px);
  }
  .shadow.s-spread { left: 40px; top: 235px; width: 760px; height: 470px; transform: translateZ(-4px); }
  .shadow.s-cover  { left: 540px; top: 190px; width: 470px; height: 620px; transform: translateZ(-2px); }

  .mag { position: absolute; border-radius: 5px; box-shadow: 0 2px 6px rgba(74,44,30,0.16); }

  .spread {
    width: 736px; height: 520px; left: 34px; top: 168px;
    display: flex; overflow: hidden;
  }
  .spread .pg { width: 50%; height: 100%; background-size: cover; background-position: center top; }
  .spread .pgL { background-image: url('p06_2x.png'); }
  .spread .pgR { background-image: url('p07_2x.png'); }
  .spread::after {
    content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 52px;
    transform: translateX(-50%);
    background: linear-gradient(90deg, rgba(40,20,10,0) 0%, rgba(40,20,10,0.10) 40%, rgba(40,20,10,0.20) 50%, rgba(40,20,10,0.10) 60%, rgba(40,20,10,0) 100%);
    pointer-events: none;
  }

  .cover {
    width: 412px; height: 582px; left: 560px; top: 118px;
    background: url('cover2x.png') center / cover no-repeat; overflow: hidden;
    transform: translateZ(16px);
    box-shadow: 0 3px 10px rgba(74,44,30,0.20);
  }
  .cover::before {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(100deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.03) 4%, rgba(0,0,0,0) 9%),
      linear-gradient(100deg, rgba(255,255,255,0) 88%, rgba(255,255,255,0.22) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="scene">
      <div class="shadow s-spread"></div>
      <div class="shadow s-cover"></div>
      <div class="mag spread"><div class="pg pgL"></div><div class="pg pgR"></div></div>
      <div class="mag cover"></div>
    </div>
  </div>
</body>
</html>
