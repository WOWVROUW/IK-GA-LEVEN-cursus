<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Mockup e-book Het begon met liefde</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }

  /* Renderformaat: 1600 x 1200 (2x -> 3200 x 2400) */
  .stage {
    width: 1600px;
    height: 1200px;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 2800px;
    background: transparent;
  }

  .scene { position: relative; transform-style: preserve-3d; }

  /* Contactschaduw op de "vloer" */
  .floor {
    position: absolute;
    left: 50%;
    bottom: -70px;
    width: 640px;
    height: 90px;
    transform: translateX(-50%) rotateX(78deg);
    background: radial-gradient(ellipse at center, rgba(60,20,45,0.34) 0%, rgba(60,20,45,0.16) 42%, rgba(60,20,45,0) 72%);
    filter: blur(14px);
    z-index: 0;
  }

  .book {
    position: relative;
    width: 620px;
    height: 877px;              /* A4-verhouding 1:1.414 */
    transform-style: preserve-3d;
    transform: rotateY(-23deg) rotateX(3deg);
    filter: drop-shadow(34px 46px 42px rgba(60,20,45,0.30));
    z-index: 1;
  }

  /* Voorkant: de cover */
  .front {
    position: absolute;
    inset: 0;
    background: url('cover2x.png') center / cover no-repeat;
    border-radius: 3px 7px 7px 3px;
    transform: translateZ(14px);
    overflow: hidden;
  }
  /* Rug-schaduw links + lichtglans rechts, voor diepte */
  .front::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.22) 0%, rgba(0,0,0,0.06) 5%, rgba(0,0,0,0) 12%),
      linear-gradient(90deg, rgba(255,255,255,0) 82%, rgba(255,255,255,0.28) 100%);
    pointer-events: none;
  }

  /* Rechterkant: papierstapel (bladranden) */
  .pages {
    position: absolute;
    top: 3px;
    left: 100%;
    width: 28px;
    height: calc(100% - 6px);
    transform-origin: left center;
    transform: rotateY(90deg);
    background: repeating-linear-gradient(90deg,
      #ffffff 0px, #ffffff 1px, #ece6dd 1px, #ece6dd 3px);
    border-radius: 0 2px 2px 0;
  }

  /* Bovenrand papier (dunne stapel bovenop) */
  .top {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 28px;
    transform-origin: center top;
    transform: rotateX(-90deg);
    background: repeating-linear-gradient(0deg,
      #ffffff 0px, #ffffff 1px, #e8e2d8 1px, #e8e2d8 3px);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="scene">
      <div class="floor"></div>
      <div class="book">
        <div class="pages"></div>
        <div class="top"></div>
        <div class="front"></div>
      </div>
    </div>
  </div>
</body>
</html>
