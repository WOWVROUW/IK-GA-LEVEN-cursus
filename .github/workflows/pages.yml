name: Deploy preview to GitHub Pages

# Publiceert de statische site naar GitHub Pages. Getriggerd op de
# werk-branch zodat de preview de laatste wijzigingen toont. Pages wordt
# bij de eerste succesvolle run automatisch aangezet.

on:
  push:
    branches: ["claude/ik-ga-leven-hero-image-x2dn1l"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
